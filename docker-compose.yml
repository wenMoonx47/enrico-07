version: "3.9"

services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: enrico-portfolio
    ports:
      - "3000:3000"
    env_file:
      - .env.local          # copy .env.example → .env.local and fill in values
    environment:
      NODE_ENV: production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

# To run:
#   1. cp .env.example .env.local && nano .env.local
#   2. docker compose up -d
#   3. Open http://localhost:3000
